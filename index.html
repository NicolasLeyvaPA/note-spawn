<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time lecture transcription with AI-powered note enhancement. Stop taking notes, start paying attention.">
    <meta property="og:title" content="NoteSpawn - AI Lecture Notes">
    <meta property="og:description" content="Real-time lecture transcription with AI-powered note enhancement.">
    <meta property="og:type" content="website">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
    <title>NoteSpawn</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79b8ff;
            --success: #3fb950;
            --danger: #f85149;
            --warning: #d29922;
            --danger-hover: #ff6b63;
            --bg-highlight: #1a2332;
            --bg-highlight-alt: #162029;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 600;
        }

        .logo-icon {
            font-size: 32px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            background: var(--bg-tertiary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
        }

        .status-dot.recording {
            background: var(--danger);
            animation: pulse 1.5s infinite;
        }

        .status-dot.connected {
            background: var(--success);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .control-group {
            margin-bottom: 16px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        select, input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: var(--danger-hover);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .session-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .session-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
        }

        .session-item:hover {
            background: var(--bg-tertiary);
        }

        .session-item.active {
            background: var(--bg-tertiary);
            border-left: 3px solid var(--accent);
        }

        .session-date {
            font-size: 14px;
            font-weight: 500;
        }

        .session-id {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .tab:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        .tab.active {
            color: var(--accent);
            background: var(--bg-tertiary);
        }

        .content-area {
            flex: 1;
            min-height: 500px;
        }

        .notes-container {
            height: 100%;
            overflow-y: auto;
        }

        .chunk {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .chunk-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .chunk-number {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
        }

        .chunk-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .chunk-content {
            line-height: 1.6;
        }

        .chunk-content h1, .chunk-content h2, .chunk-content h3 {
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .chunk-content h1:first-child, .chunk-content h2:first-child, .chunk-content h3:first-child {
            margin-top: 0;
        }

        .chunk-content ul, .chunk-content ol {
            margin-left: 20px;
            margin-bottom: 12px;
        }

        .chunk-content li {
            margin-bottom: 4px;
        }

        .chunk-content strong {
            color: var(--accent);
        }

        .chunk-content code {
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
        }

        .transcript-text {
            color: var(--text-secondary);
            font-style: italic;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            color: var(--text-secondary);
            text-align: center;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .summary-section {
            background: linear-gradient(135deg, var(--bg-highlight) 0%, var(--bg-highlight-alt) 100%);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .summary-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .api-warning {
            background: rgba(210, 153, 34, 0.1);
            border: 1px solid var(--warning);
            color: var(--warning);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .hidden {
            display: none !important;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                flex-direction: row;
                flex-wrap: wrap;
            }
            
            .sidebar .card {
                flex: 1;
                min-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">🎓</span>
                <span>Lecture Notes AI</span>
            </div>
            <div class="status-badge">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
        </header>

        <div class="main-grid">
            <aside class="sidebar">
                <div class="card">
                    <div class="card-title">Controls</div>
                    
                    <div id="apiWarning" class="api-warning hidden">
                        ⚠️ No API key found. Set ANTHROPIC_API_KEY for AI enhancement.
                    </div>
                    
                    <div class="control-group">
                        <label>Microphone</label>
                        <select id="deviceSelect">
                            <option value="-1">Loading...</option>
                        </select>
                    </div>
                    
                    <div class="control-group">
                        <label>Chunk Duration</label>
                        <select id="chunkDuration">
                            <option value="30">30 seconds</option>
                            <option value="60" selected>60 seconds</option>
                            <option value="90">90 seconds</option>
                            <option value="120">2 minutes</option>
                        </select>
                    </div>
                    
                    <div class="control-group">
                        <label>Whisper Model</label>
                        <select id="modelSize">
                            <option value="tiny">Tiny (fastest)</option>
                            <option value="base" selected>Base (balanced)</option>
                            <option value="small">Small (accurate)</option>
                            <option value="medium">Medium (more accurate)</option>
                        </select>
                    </div>
                    
                    <button class="btn btn-primary" id="startBtn">
                        <span>▶</span> Start Recording
                    </button>
                    <button class="btn btn-danger hidden" id="stopBtn">
                        <span>⬛</span> Stop Recording
                    </button>
                </div>

                <div class="card">
                    <div class="card-title">Past Sessions</div>
                    <div class="session-list" id="sessionList">
                        <div class="empty-state" style="height: 150px;">
                            <div style="font-size: 24px; margin-bottom: 8px;">📁</div>
                            <div style="font-size: 13px;">No sessions yet</div>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="main-content">
                <div class="tabs">
                    <button class="tab active" data-tab="live">Live Notes</button>
                    <button class="tab" data-tab="history">Session History</button>
                </div>

                <div class="content-area">
                    <div id="liveTab" class="notes-container">
                        <div class="empty-state" id="emptyState">
                            <div class="empty-icon">🎤</div>
                            <div class="empty-title">Ready to Record</div>
                            <div>Click "Start Recording" to begin capturing lecture notes</div>
                        </div>
                        <div id="notesContent" class="hidden"></div>
                    </div>
                    
                    <div id="historyTab" class="notes-container hidden">
                        <div class="empty-state" id="historyEmpty">
                            <div class="empty-icon">📚</div>
                            <div class="empty-title">Select a Session</div>
                            <div>Choose a past session from the sidebar to view notes</div>
                        </div>
                        <div id="historyContent" class="hidden"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const socket = io();
        
        // DOM elements
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const deviceSelect = document.getElementById('deviceSelect');
        const chunkDuration = document.getElementById('chunkDuration');
        const modelSize = document.getElementById('modelSize');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const sessionList = document.getElementById('sessionList');
        const emptyState = document.getElementById('emptyState');
        const notesContent = document.getElementById('notesContent');
        const apiWarning = document.getElementById('apiWarning');
        const liveTab = document.getElementById('liveTab');
        const historyTab = document.getElementById('historyTab');
        const historyContent = document.getElementById('historyContent');
        const historyEmpty = document.getElementById('historyEmpty');
        
        let isRecording = false;
        let currentChunks = [];
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const tabName = tab.dataset.tab;
                liveTab.classList.toggle('hidden', tabName !== 'live');
                historyTab.classList.toggle('hidden', tabName !== 'history');
            });
        });
        
        // Load devices
        async function loadDevices() {
            const res = await fetch('/api/devices');
            const devices = await res.json();
            
            deviceSelect.innerHTML = '<option value="-1">System Default</option>';
            devices.forEach(dev => {
                const opt = document.createElement('option');
                opt.value = dev.id;
                opt.textContent = dev.name + (dev.default ? ' (default)' : '');
                deviceSelect.appendChild(opt);
            });
        }
        
        // Load sessions
        async function loadSessions() {
            const res = await fetch('/api/sessions');
            const sessions = await res.json();
            
            if (sessions.length === 0) {
                sessionList.innerHTML = `
                    <div class="empty-state" style="height: 150px;">
                        <div style="font-size: 24px; margin-bottom: 8px;">📁</div>
                        <div style="font-size: 13px;">No sessions yet</div>
                    </div>
                `;
                return;
            }
            
            sessionList.innerHTML = sessions.map(s => `
                <div class="session-item" data-id="${s.id}">
                    <div class="session-date">${s.date}</div>
                    <div class="session-id">${s.id}</div>
                </div>
            `).join('');
            
            // Add click handlers
            sessionList.querySelectorAll('.session-item').forEach(item => {
                item.addEventListener('click', () => loadSession(item.dataset.id));
            });
        }
        
        // Load specific session
        async function loadSession(sessionId) {
            const res = await fetch(`/api/sessions/${sessionId}`);
            const data = await res.json();
            
            if (data.content) {
                // Switch to history tab
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelector('[data-tab="history"]').classList.add('active');
                liveTab.classList.add('hidden');
                historyTab.classList.remove('hidden');
                
                // Mark active session
                sessionList.querySelectorAll('.session-item').forEach(item => {
                    item.classList.toggle('active', item.dataset.id === sessionId);
                });
                
                // Render content
                historyEmpty.classList.add('hidden');
                historyContent.classList.remove('hidden');
                historyContent.innerHTML = `
                    <div class="chunk">
                        <div class="chunk-content">${marked.parse(data.content)}</div>
                    </div>
                `;
            }
        }
        
        // Socket events
        socket.on('connect', () => {
            statusDot.classList.add('connected');
            statusText.textContent = 'Connected';
            loadDevices();
            loadSessions();
        });
        
        socket.on('disconnect', () => {
            statusDot.classList.remove('connected', 'recording');
            statusText.textContent = 'Disconnected';
        });
        
        socket.on('status', (data) => {
            statusText.textContent = data.message;
            
            if (data.recording !== undefined) {
                isRecording = data.recording;
                statusDot.classList.toggle('recording', data.recording);
                startBtn.classList.toggle('hidden', data.recording);
                stopBtn.classList.toggle('hidden', !data.recording);
            }
            
            if (data.has_api_key === false) {
                apiWarning.classList.remove('hidden');
            }
        });
        
        socket.on('session_started', (data) => {
            currentChunks = [];
            emptyState.classList.add('hidden');
            notesContent.classList.remove('hidden');
            notesContent.innerHTML = '';
            
            // Switch to live tab
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector('[data-tab="live"]').classList.add('active');
            liveTab.classList.remove('hidden');
            historyTab.classList.add('hidden');
        });
        
        socket.on('transcript', (data) => {
            const existingChunk = document.getElementById(`chunk-${data.chunk}`);
            if (!existingChunk) {
                const chunkDiv = document.createElement('div');
                chunkDiv.className = 'chunk';
                chunkDiv.id = `chunk-${data.chunk}`;
                chunkDiv.innerHTML = `
                    <div class="chunk-header">
                        <span class="chunk-number">Chunk ${data.chunk}</span>
                        <span class="chunk-time">${new Date().toLocaleTimeString()}</span>
                    </div>
                    <div class="transcript-text">"${data.text}"</div>
                    <div class="chunk-content">Processing...</div>
                `;
                notesContent.prepend(chunkDiv);
            }
        });
        
        socket.on('notes', (data) => {
            const chunkDiv = document.getElementById(`chunk-${data.chunk}`);
            if (chunkDiv) {
                const contentDiv = chunkDiv.querySelector('.chunk-content');
                contentDiv.innerHTML = marked.parse(data.content);
            }
        });
        
        socket.on('summary', (data) => {
            const summaryDiv = document.createElement('div');
            summaryDiv.className = 'summary-section';
            summaryDiv.innerHTML = `
                <div class="summary-title">📚 Final Summary</div>
                <div class="chunk-content">${marked.parse(data.content)}</div>
            `;
            notesContent.prepend(summaryDiv);
        });
        
        socket.on('session_ended', (data) => {
            loadSessions();
        });
        
        socket.on('error', (data) => {
            alert(data.message);
        });
        
        // Button handlers
        startBtn.addEventListener('click', () => {
            socket.emit('start_recording', {
                chunk_duration: parseInt(chunkDuration.value),
                device_id: parseInt(deviceSelect.value),
                model_size: modelSize.value
            });
        });
        
        stopBtn.addEventListener('click', () => {
            socket.emit('stop_recording');
        });
        
        // Disable controls while recording
        function updateControls() {
            deviceSelect.disabled = isRecording;
            chunkDuration.disabled = isRecording;
            modelSize.disabled = isRecording;
        }
        
        socket.on('status', updateControls);
    </script>
</body>
</html>
